name: Update requirements.txt from notebooks

on:
  push:
    branches: [ main, master, changelog ]
    paths:
      - 'notebooks/*/requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run merge script
        run: |
          python .tools/python/merge_requirements.py --source-dir notebooks --output requirements.txt --generate-env --env-output environment.yml

      - name: Test environment (create venv and pip install)
        run: |
          set -e
          python -V
          python -m venv .venv
          # shellcheck disable=SC1091
          . .venv/bin/activate
          pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ] && [ -s requirements.txt ]; then
            # prefer binary wheels for speed when available
            pip install --prefer-binary -r requirements.txt
          else
            echo "No requirements.txt or file empty, skipping pip install"
          fi
        shell: bash

      - name: Commit changes
        if: ${{ success() }}
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update consolidated requirements.txt and environment.yml"
          file_pattern: |
            requirements.txt
            environment.yml
          branch: main
